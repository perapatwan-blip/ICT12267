<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS7_68026233 Perapat Wanna</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video autoplay muted loop id="myVideo">
        <source src="204006-923133925_small.mp4" type="video/mp4">
    </video>
้    
    <div class="form-wrapper">
        <div class="card p-4 shadow form-card">
            <h2 class="text-center mb-4">แบบฟอร์มลงทะเบียน</h2>

            <form action="#" method="post">
                <div class="mb-3">
                    <label class="form-label">ชื่อ-นามสกุล:</label>
                    <input type="text" class="form-control" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">อีเมล:</label>
                    <input type="email" class="form-control" placeholder="example@domain.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">รหัสผ่าน:</label>
                    <input type="password" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">เพศ:</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="male">
                        <label class="form-check-label" for="male">ชาย</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="female">
                        <label class="form-check-label" for="female">หญิง</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">ตำแหน่ง:</label>
                    <select class="form-select">
                        <option selected disabled>-- เลือกตำแหน่ง --</option>
                        <option value="Manager">Manager</option>
                        <option value="Developer">Developer</option>
                        <option value="Designer">Designer</option>
                        <option value="Marketing">Marketing</option>
                    </select>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary me-2">ลงทะเบียน</button>
                    <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <div class="video-controls">
        <button type="button" class="btn" onclick="document.getElementById('myVideo').play()">
            <i class="bi bi-play-fill"></i> Play
        </button>
        <button type="button" class="btn" onclick="document.getElementById('myVideo').pause()">
            <i class="bi bi-pause-fill"></i> Stop
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
